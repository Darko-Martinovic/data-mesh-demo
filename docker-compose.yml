# Each service is built from the REPO ROOT as context so Dockerfiles can COPY
# both the domain folder and the shared platform/event_bus package.
#
# Compatible with both Docker Compose and Podman Compose.

services:

  # ── Data Catalogue (port 8000) ─────────────────────────────────────────────
  catalogue:
    build: ./platform/data-catalogue
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3)\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ── Customer Domain (port 8001) ────────────────────────────────────────────
  customer:
    build: ./domains/customer
    ports:
      - "8001:8001"
    environment:
      - CATALOGUE_URL=http://catalogue:8000
      - SELF_URL=http://customer:8001
    depends_on:
      - catalogue
    restart: on-failure

  # ── Orders Domain (port 8002) ──────────────────────────────────────────────
  orders:
    build: ./domains/orders
    ports:
      - "8002:8002"
    environment:
      - CATALOGUE_URL=http://catalogue:8000
      - SELF_URL=http://orders:8002
      - CUSTOMER_URL=http://customer:8001
      - INVENTORY_URL=http://inventory:8003
    depends_on:
      - catalogue
    restart: on-failure

  # ── Inventory Domain (port 8003) ───────────────────────────────────────────
  inventory:
    build: ./domains/inventory
    ports:
      - "8003:8003"
    environment:
      - CATALOGUE_URL=http://catalogue:8000
      - SELF_URL=http://inventory:8003
    depends_on:
      - catalogue
    restart: on-failure
