# Data Mesh Demo — Docker/Podman Compose configuration
#
# Compatible with both Docker Compose and Podman Compose.
# All services start together; domains will retry catalogue registration on failure.

services:

  # ── Data Catalogue (port 8000) ─────────────────────────────────────────────
  catalogue:
    build: ./platform/data-catalogue
    ports:
      - "8000:8000"
    restart: on-failure

  # ── Customer Domain (port 8001) ────────────────────────────────────────────
  customer:
    build: ./domains/customer
    ports:
      - "8001:8001"
    environment:
      - CATALOGUE_URL=http://catalogue:8000
      - SELF_URL=http://customer:8001
    restart: on-failure

  # ── Orders Domain (port 8002) ──────────────────────────────────────────────
  orders:
    build: ./domains/orders
    ports:
      - "8002:8002"
    environment:
      - CATALOGUE_URL=http://catalogue:8000
      - SELF_URL=http://orders:8002
      - CUSTOMER_URL=http://customer:8001
      - INVENTORY_URL=http://inventory:8003
    restart: on-failure

  # ── Inventory Domain (port 8003) ───────────────────────────────────────────
  inventory:
    build: ./domains/inventory
    ports:
      - "8003:8003"
    environment:
      - CATALOGUE_URL=http://catalogue:8000
      - SELF_URL=http://inventory:8003
    restart: on-failure
